apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-backend
  namespace: mern
  labels:
    app.kubernetes.io/name: mern-backend
    app.kubernetes.io/part-of: mern-stack
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mern-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mern-backend
        app.kubernetes.io/part-of: mern-stack
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: backend
          image: vaibhavsoni21/mern-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DB
              value: mongodb://admin:password@mongodb:27017/mern-crud?authSource=admin
            - name: CORS
              value: "true"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
              
            limits:
              cpu: 600m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 30
