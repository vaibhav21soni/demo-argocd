apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-backend
  namespace: mern
  labels:
    app.kubernetes.io/name: mern-backend
    app.kubernetes.io/part-of: mern-stack
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mern-backend
      app.kubernetes.io/part-of: mern-stack
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mern-backend
        app.kubernetes.io/part-of: mern-stack
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: backend
          image: vaibhavsoni21/mern-backend:90d87fd
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DB
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: mongodb-uri
            - name: CORS
              value: "true"
          resources:
            requests:
              cpu: 150m
              memory: 300Mi
            limits:
              cpu: 400m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 30
