apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mern-ingress
  namespace: mern
  labels:
    app.kubernetes.io/name: mern-ingress
    app.kubernetes.io/part-of: mern-stack
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/healthz
    alb.ingress.kubernetes.io/healthcheck-port: "traffic-port"
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=false
    # Replace the following placeholders with your values:
    # - subnets: comma-separated public subnet IDs for the ALB
    # - certificate-arn: ARN of an ACM certificate for your domain (optional, required for HTTPS)
    alb.ingress.kubernetes.io/subnets: "<your-public-subnet-ids>"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: "<your-acm-certificate-arn>"
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mern-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mern-backend
                port:
                  number: 3000
