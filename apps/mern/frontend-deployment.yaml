apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-frontend
  namespace: mern
  labels:
    app.kubernetes.io/name: mern-frontend
    app.kubernetes.io/part-of: mern-stack
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mern-frontend
      app.kubernetes.io/part-of: mern-stack
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mern-frontend
        app.kubernetes.io/part-of: mern-stack
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: frontend
          image: vaibhavsoni21/mern-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: REACT_APP_API_URL
              value: "localhost:3000"
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 250m
              memory: 350Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 30
