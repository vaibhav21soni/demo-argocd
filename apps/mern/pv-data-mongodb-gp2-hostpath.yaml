apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-data-mongodb-gp2
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: gp2
  hostPath:
    path: /mnt/data/mongodb-gp2
    type: DirectoryOrCreate
  claimRef:
    namespace: mern
    name: mongodb-pvc-gp2
